<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Karyawan - Supabase Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen relative overflow-x-hidden">
    
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-full max-w-xs pointer-events-none"></div>

    <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-center items-center">
            <h1 class="text-2xl font-bold text-emerald-600 flex items-center gap-2">
                <i class="fa-solid fa-fingerprint"></i>
                ABSENSI
            </h1>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 sm:p-6 mt-4">
        <section id="user-content" class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
            
            <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-200 text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-50 rounded-bl-full -z-10"></div>

                <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                    <i class="fa-solid fa-user-check text-2xl"></i>
                </div>
                
                <div class="mb-8">
                    <div id="live-clock" class="text-4xl sm:text-5xl font-bold text-slate-800 font-mono tracking-tight drop-shadow-sm">00:00:00</div>
                    <div id="live-date" class="text-sm sm:text-base text-slate-500 font-medium mt-2 bg-slate-50 inline-block px-4 py-1 rounded-full border border-slate-100">Memuat tanggal...</div>
                </div>

                <h2 class="text-lg font-bold text-slate-700 mb-4 uppercase tracking-wide">Verifikasi Kehadiran</h2>
                
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-keyboard text-slate-400"></i>
                    </div>
                    <input type="text" id="employee-code-input" class="w-full pl-10 pr-4 py-4 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent text-center font-bold text-xl uppercase transition-all shadow-sm" placeholder="KODE KARYAWAN" autocomplete="off">
                </div>
                
                <p id="employee-resolved-name" class="mt-3 text-sm text-slate-500 font-medium transition-all duration-300">Silakan masukkan 6 digit kode Anda</p>
                
                <button id="btn-check-out" disabled class="mt-5 w-full p-4 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-xl disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2">
                    <i class="fa-solid fa-person-walking-arrow-right"></i> Absen Keluar
                </button>
            </div>

            <div id="daily-attendance-summary" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm transition-all duration-300"></div>
            
        </section>
    </main>

    <script>
        // Konfigurasi Supabase
        const SUPABASE_URL = 'https://tigszfvmbpvznotykryx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpZ3N6ZnZtYnB2em5vdHlrcnl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MzQwMjcsImV4cCI6MjA5OTMxMDAyN30.O0-y9FI_sikkPVig2XNDJ_zlTnfJZv-hRirPurs8yQc';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Konfigurasi Telegram
        const TELEGRAM_BOT_TOKEN = "8863289019:AAGy7A9x9AV3HD7Kh2Xbzv-O3JZSlNERtZo";
        const TELEGRAM_CHAT_ID = "-1004473111299";
        const TELEGRAM_URL = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

        // State Data
        let masterEmployeeList = [];
        let cachedRecords = [];

        // Fungsi Bantuan Waktu & Tanggal
        function getLocalDateString() { return new Date().toISOString().split('T')[0]; }
        function formatDate(date) { return date; }
        function cleanTime(time) { return time ? time : "--"; }

        // Fungsi Notifikasi Modern (Pengganti Alert)
        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let borderColor = type === 'success' ? 'border-emerald-500' : (type === 'error' ? 'border-rose-500' : 'border-blue-500');
            let icon = type === 'success' ? '<i class="fa-solid fa-circle-check text-emerald-500"></i>' : (type === 'error' ? '<i class="fa-solid fa-circle-exclamation text-rose-500"></i>' : '<i class="fa-solid fa-circle-info text-blue-500"></i>');

            toast.className = `p-4 mb-2 bg-white rounded-xl shadow-lg border-l-4 ${borderColor} transform transition-all duration-300 translate-x-full flex items-start gap-3 pointer-events-auto`;
            toast.innerHTML = `
                <div class="mt-1">${icon}</div>
                <div>
                    <h4 class="font-bold text-slate-800 text-sm">${title}</h4>
                    <p class="text-xs text-slate-600 mt-0.5">${message}</p>
                </div>
            `;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                setTimeout(() => toast.classList.remove('translate-x-full'), 10);
            });
            
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // Fungsi Jam Digital
        function initClock() {
            function updateTime() {
                const now = new Date();
                const timeString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).replace(/\./g, ':');
                const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const dateString = now.toLocaleDateString('id-ID', dateOptions);
                
                const clockEl = document.getElementById('live-clock');
                const dateEl = document.getElementById('live-date');
                
                if (clockEl) clockEl.textContent = timeString;
                if (dateEl) dateEl.textContent = dateString;
            }
            updateTime();
            setInterval(updateTime, 1000);
        }

        // Layanan Komunikasi dengan Supabase
        const apiService = {
            async fetchAllEmployees() {
                const { data } = await supabaseClient.from('employees').select('*');
                return data || [];
            },
            async fetchAllRecords() {
                const today = getLocalDateString();
                const { data } = await supabaseClient.from('attendance').select('*').eq('date', today).order('checkIn', { ascending: false });
                return data || [];
            },
            async verifyEmployee(code) {
                const { data: user } = await supabaseClient.from('employees').select('*').eq('code', code).single();
                if (!user) return { success: false };
                
                const today = getLocalDateString();
                const { data: record } = await supabaseClient.from('attendance').select('*').eq('employeeCode', code).eq('date', today).maybeSingle();
                return { success: true, user, record };
            },
            async createRecord(code, name, time) {
                const today = getLocalDateString();
                return await supabaseClient.from('attendance').insert([{ date: today, employeeCode: code, employeeName: name, checkIn: time }]);
            },
            async checkOut(code, time) {
                const today = getLocalDateString();
                return await supabaseClient.from('attendance').update({ checkOut: time }).eq('employeeCode', code).eq('date', today);
            }
        };

        // Fungsi Bantuan untuk mendapatkan karyawan yang belum hadir
        async function getNotPresentEmployees() {
            if (masterEmployeeList.length === 0) {
                masterEmployeeList = await apiService.fetchAllEmployees();
            }
            const todayStr = getLocalDateString();
            const presentCodes = cachedRecords
                .filter(r => r.date === todayStr && r.checkIn && r.checkIn !== "--")
                .map(r => r.employeeCode);
                
            return masterEmployeeList.filter(emp => !presentCodes.includes(emp.code));
        }

        // Fungsi Notifikasi Laporan Telegram
        async function sendTelegramNotification(employeeName, action) {
            // Data sudah harus disinkronkan (melalui refreshDashboardData) sebelum fungsi ini dipanggil
            const todayStr = getLocalDateString();
            const presentRecords = cachedRecords.filter(r => r.date === todayStr && r.checkIn && r.checkIn !== "--");
            
            const sedangBekerja = presentRecords.filter(r => !r.checkOut || r.checkOut === '--');
            const sudahPulang = presentRecords.filter(r => r.checkOut && r.checkOut !== '--');
            const belumHadir = await getNotPresentEmployees();

            const time = new Date().toLocaleTimeString('id-ID', { hour12: false }).replace(/\./g, ':');
            const date = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            let message = `🔔 *NOTIFIKASI ABSENSI*\n`;
            message += `📅 ${date} - ${time}\n\n`;
            message += `👤 *${employeeName}* baru saja melakukan *${action}*.\n\n`;
            
            message += `📊 *REKAP STATUS SAAT INI:*\n\n`;
            
            // List Sedang Bekerja
            message += `🟢 *SEDANG BEKERJA (${sedangBekerja.length}):*\n`;
            if(sedangBekerja.length > 0) {
                sedangBekerja.forEach(emp => message += `- ${emp.employeeName} (Masuk: ${emp.checkIn})\n`);
            } else {
                message += `- Tidak ada\n`;
            }
            
            // List Sudah Pulang
            message += `\n🔴 *SUDAH PULANG (${sudahPulang.length}):*\n`;
            if(sudahPulang.length > 0) {
                sudahPulang.forEach(emp => message += `- ${emp.employeeName} (Keluar: ${emp.checkOut})\n`);
            } else {
                message += `- Tidak ada\n`;
            }
            
            // List Belum Hadir / Absen
            message += `\n⚪ *BELUM HADIR/ABSEN (${belumHadir.length}):*\n`;
            if(belumHadir.length > 0) {
                belumHadir.forEach(emp => message += `- ${emp.name}\n`);
            } else {
                message += `- Semua Karyawan Hadir\n`;
            }

            try {
                await fetch(TELEGRAM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
            } catch(err) {
                console.error("Gagal mengirim notifikasi Telegram:", err);
            }
        }

        // Fungsi Ringkasan Live dari pengguna
        async function updateLiveAttendanceSummary(isLoadingSheet = false) {
            const summaryContainer = document.getElementById('daily-attendance-summary');
            if (!summaryContainer) return;
            
            summaryContainer.classList.remove('hidden');

            if (isLoadingSheet) {
                summaryContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center py-6 px-2 text-center">
                    <div class="bg-indigo-50 text-indigo-500 w-12 h-12 rounded-full flex items-center justify-center mb-3">
                        <i class="fa-solid fa-arrows-rotate fa-spin text-xl"></i>
                    </div>
                    <h4 class="text-sm font-bold text-slate-700 uppercase tracking-wider mb-1">Sinkronisasi Data</h4>
                    <p class="text-xs text-slate-500 mb-5">Memuat data presensi dan master karyawan...</p>
                    <div class="w-full space-y-2 animate-pulse">
                        <div class="h-10 bg-slate-200/70 rounded-lg w-full"></div>
                        <div class="h-10 bg-slate-200/70 rounded-lg w-full"></div>
                        <div class="h-10 bg-slate-200/70 rounded-lg w-full"></div>
                    </div>
                </div>`;
                return; 
            }

            const todayStr = getLocalDateString();
            const recordsToUse = typeof cachedRecords !== 'undefined' ? cachedRecords : [];
            const presentRecords = recordsToUse
                .filter(r => r.date === todayStr && r.checkIn && r.checkIn !== "--")
                .sort((a, b) => b.checkIn.localeCompare(a.checkIn));
            const notPresentEmployees = await getNotPresentEmployees();

            let html = `<div class="flex flex-col gap-6">`;
            
            // --- TAMPILAN KARYAWAN SUDAH HADIR ---
            html += `<div>
                <h4 class="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                    <i class="fa-solid fa-user-check"></i> Sudah Hadir (${presentRecords.length})
                </h4>`;
                
            if (presentRecords.length > 0) {
                html += `<ul class="space-y-1.5 max-h-48 overflow-y-auto pr-2 custom-scrollbar">`;
                presentRecords.forEach(r => {
                    html += `
                    <li class="flex justify-between items-center bg-emerald-50/50 border border-emerald-100 px-3 py-2 rounded-lg text-sm text-emerald-800 transition-all hover:bg-emerald-50">
                        <span class="font-semibold">${r.employeeName || 'Karyawan'}</span>
                        <div class="flex gap-2">
                            <span class="text-xs font-mono bg-emerald-100 px-2 py-1 rounded-md" title="Masuk">${r.checkIn}</span>
                            ${r.checkOut && r.checkOut !== '--' ? `<span class="text-xs font-mono bg-rose-100 text-rose-700 px-2 py-1 rounded-md" title="Keluar">${r.checkOut}</span>` : ''}
                        </div>
                    </li>`;
                });
                html += `</ul>`;
            } else {
                html += `<p class="text-xs text-slate-400 italic bg-slate-50 p-3 rounded-lg border border-slate-100 text-center">Belum ada presensi masuk hari ini.</p>`;
            }
            html += `</div>`;

            html += `<hr class="border-slate-100">`;

            // --- TAMPILAN KARYAWAN BELUM HADIR ---
            html += `<div>
                <h4 class="text-xs font-bold text-rose-500 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                    <i class="fa-solid fa-user-clock"></i> Belum Hadir (${notPresentEmployees.length})
                </h4>`;
                
            if (notPresentEmployees.length > 0) {
                html += `<ul class="space-y-1.5 max-h-48 overflow-y-auto pr-2 custom-scrollbar">`;
                notPresentEmployees.forEach(emp => {
                    html += `
                    <li class="flex justify-between items-center bg-slate-50 border border-slate-100 px-3 py-2 rounded-lg text-sm text-slate-600 hover:bg-slate-100 transition-all">
                        <span class="font-semibold">${emp.name}</span>
                        <span class="text-[10px] uppercase font-bold text-slate-400 bg-white px-2 py-1 rounded shadow-sm border border-slate-200">${emp.code}</span>
                    </li>`;
                });
                html += `</ul>`;
            } else {
                html += `<p class="text-xs text-slate-400 italic bg-slate-50 p-3 rounded-lg border border-slate-100 text-center">Semua karyawan sudah hadir.</p>`;
            }
            html += `</div>`; 
            html += `</div>`; 

            summaryContainer.innerHTML = html;
        }

        async function refreshDashboardData() {
            try {
                updateLiveAttendanceSummary(true); 

                const rawData = await apiService.fetchAllRecords();
                
                cachedRecords = rawData.map(r => ({ 
                    ...r,
                    date: formatDate(r.date),
                    checkIn: cleanTime(r.checkIn),
                    checkOut: cleanTime(r.checkOut)
                }));
                
                await updateLiveAttendanceSummary(false);
            } catch (err) { 
                console.error(err); 
                showToast("Sinkronisasi Gagal", "Gagal memperbarui data dari cloud.", "error");
                await updateLiveAttendanceSummary(false); 
            }
        }

        // Handler saat mengetik kode karyawan
        let typingTimer;
        document.getElementById('employee-code-input').addEventListener('input', (e) => {
            clearTimeout(typingTimer);
            const code = e.target.value.toUpperCase();
            const btnCheckOut = document.getElementById('btn-check-out');
            const resolveText = document.getElementById('employee-resolved-name');
            
            if (code.length === 0) {
                resolveText.textContent = "Silakan masukkan 6 digit kode Anda...";
                resolveText.className = "mt-3 text-sm text-slate-500 font-medium";
                btnCheckOut.disabled = true;
                return;
            }

            if (code.length < 6) {
                resolveText.textContent = "Mencari data...";
                btnCheckOut.disabled = true;
                return;
            }

            typingTimer = setTimeout(async () => {
                e.target.disabled = true; 
                const res = await apiService.verifyEmployee(code);
                e.target.disabled = false;
                e.target.focus();

                if (res.success) {
                    resolveText.innerHTML = `<span class="text-emerald-600 font-bold"><i class="fa-solid fa-circle-check"></i> Karyawan Dikenali: ${res.user.name}</span>`;
                    
                    if (!res.record) {
                        const time = new Date().toLocaleTimeString('id-ID', { hour12: false }).replace(/\./g, ':');
                        await apiService.createRecord(res.user.code, res.user.name, time);

                        sebutkanNama(`Selamat bekerja, ${res.user.username}`);
                        
                        showToast("Berhasil Masuk!", `Selamat bekerja, ${res.user.name}. Waktu: ${time}`, "success");
                        e.target.value = ""; 
                        setTimeout(() => resolveText.textContent = "Silakan masukkan 6 digit kode Anda...", 2000);
                        
                        // Perbarui data DULU, lalu kirim ke Telegram agar rangkuman akurat
                        await refreshDashboardData(); 
                        sendTelegramNotification(res.user.name, "Absen Masuk");
                    } else if (!res.record.checkOut || res.record.checkOut === '--') {
                        btnCheckOut.disabled = false;
                        btnCheckOut.dataset.code = code; 

                        btnCheckOut.dataset.username = res.user.username;
                        btnCheckOut.dataset.name = res.user.name; // Disimpan untuk kebutuhan pesan Telegram
                        
                        showToast("Informasi", "Anda sudah absen masuk. Silakan klik tombol 'Absen Keluar' jika ingin pulang.", "info");
                    } else {
                        sebutkanNama("Anda sudah menyelesaikan absensi hari ini.");
                        showToast("Perhatian", "Anda sudah menyelesaikan absensi hari ini (Masuk & Keluar).", "error");
                        e.target.value = ""; 
                    }
                } else {
                    resolveText.innerHTML = `<span class="text-rose-500 font-bold"><i class="fa-solid fa-circle-xmark"></i> Kode Karyawan Tidak Valid</span>`;
                    sebutkanNama("Kode karyawan tidak valid.");
                    showToast("Gagal", "Kode tidak terdaftar di sistem.", "error");
                }
            }, 500); 
        });

        // Handler klik tombol Absen Keluar
        document.getElementById('btn-check-out').onclick = async function() {
            const code = this.dataset.code;
            const username = this.dataset.username;
            const name = this.dataset.name; 
            
            if (!code) return;
            
            const btn = this;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...`;
            btn.disabled = true;

            const time = new Date().toLocaleTimeString('id-ID', { hour12: false }).replace(/\./g, ':');
            await apiService.checkOut(code, time);
            
            sebutkanNama(`Terima kasih, ${username}, hati-hati di jalan.`);
            
            showToast("Berhasil Keluar!", `Terima kasih atas kerja keras Anda hari ini. Waktu: ${time}`, "success");
            
            document.getElementById('employee-code-input').value = "";
            document.getElementById('employee-resolved-name').textContent = "Silakan masukkan 6 digit kode Anda...";
            document.getElementById('employee-resolved-name').className = "mt-3 text-sm text-slate-500 font-medium";
            
            btn.innerHTML = originalText;
            
            // Perbarui data DULU, lalu kirim ke Telegram agar rangkuman akurat
            await refreshDashboardData();
            sendTelegramNotification(name, "Absen Keluar");
        };

        document.addEventListener('DOMContentLoaded', () => {
            initClock(); 
            refreshDashboardData(); 
        });

        // FUNGSI BARU: Mengubah teks menjadi suara
        function sebutkanNama(teks) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const ucapan = new SpeechSynthesisUtterance(teks);
                ucapan.lang = 'id-ID'; 
                ucapan.rate = 0.9;     
                ucapan.pitch = 1.0;    
                window.speechSynthesis.speak(ucapan);
            } else {
                console.log("Browser Anda tidak mendukung fitur Text-to-Speech.");
            }
        }
    </script>
</body>
</html>
